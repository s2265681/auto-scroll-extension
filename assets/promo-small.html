<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Small Promo Tile - 440x280</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

  .promo {
    width: 440px;
    height: 280px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-radius: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* 装饰圆 */
  .promo::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(233,69,96,0.15) 0%, transparent 70%);
    top: -100px; right: -80px;
  }
  .promo::after {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(78,204,163,0.1) 0%, transparent 70%);
    bottom: -60px; left: -40px;
  }

  .promo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #e94560, #c23152);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(233,69,96,0.4);
    z-index: 1;
  }

  .promo h1 {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 8px;
    z-index: 1;
  }

  .promo p {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    color: #8888aa;
    z-index: 1;
    margin-bottom: 20px;
  }

  .promo-keys {
    display: flex;
    gap: 12px;
    z-index: 1;
  }
  .promo-key {
    background: rgba(233,69,96,0.15);
    border: 1px solid rgba(233,69,96,0.3);
    color: #e94560;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-family: -apple-system, monospace;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="promo">
  <div class="promo-icon">▼</div>
  <h1>Auto Scroll Reader</h1>
  <p>解放双手，沉浸阅读</p>
  <div class="promo-keys">
    <span class="promo-key">Space 暂停</span>
    <span class="promo-key">← → 调速</span>
    <span class="promo-key">10 档速度</span>
  </div>
</div>

</body>
</html>
